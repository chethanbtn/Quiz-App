<!DOCTYPE html>
<html>

<head>
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="quiz-container">

        <h2 id="question">Question</h2>

        <ul>
            <li>
                <input type="radio" name="answer" class="answer" id="a">
                <label id="a_text"></label>
            </li>

            <li>
                <input type="radio" name="answer" class="answer" id="b">
                <label id="b_text"></label>
            </li>

            <li>
                <input type="radio" name="answer" class="answer" id="c">
                <label id="c_text"></label>
            </li>

            <li>
                <input type="radio" name="answer" class="answer" id="d">
                <label id="d_text"></label>
            </li>
        </ul>

        <p id="timer">Time Left: 10</p>

        <button id="submit">Next</button>

        <div id="result"></div>

    </div>

    <script src="quiz.js"></script>

</body>

</html>
